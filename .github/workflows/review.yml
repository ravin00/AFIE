name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff of the pull request
        id: get_diff
        shell: bash
        env:
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |-
          git fetch origin "$PULL_REQUEST_HEAD_REF"
          git fetch origin "$PULL_REQUEST_BASE_REF"
          git checkout "$PULL_REQUEST_HEAD_REF"
          git diff "origin/$PULL_REQUEST_BASE_REF" \
            ':(exclude)**/bin/**' \
            ':(exclude)**/obj/**' \
            ':(exclude)**/*.Designer.cs' \
            ':(exclude)**/*.g.cs' \
            ':(exclude)**/*.g.i.cs' \
            ':(exclude)**/Migrations/**' \
            ':(exclude)*.csproj' \
            ':(exclude)*.sln' \
            ':(exclude)packages.lock.json' \
            > diff.txt
          {
            echo "pull_request_diff<<EOF"
            cat diff.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: rubensflinco/gemini-code-review-action@1.0.5
        name: Code Review by Gemini AI
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          github_pull_request_number: ${{ github.event.pull_request.number }}
          git_commit_hash: ${{ github.event.pull_request.head.sha }}
          model: "gemini-1.5-pro-latest"
          pull_request_diff: |-
            ${{ steps.get_diff.outputs.pull_request_diff }}
          pull_request_chunk_size: "3500"
          extra_prompt: |-
            You are reviewing a C#/.NET codebase. Focus on: correctness, null-safety,
            async/await misuse, dependency-injection issues, resource disposal,
            and test coverage. Skip nitpicks about formatting.
          log_level: "INFO"
