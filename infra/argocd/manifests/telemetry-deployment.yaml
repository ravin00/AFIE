apiVersion: apps/v1
kind: Deployment
metadata:
  name: afie-telemetry
  namespace: afie-system
  labels:
    app: afie-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: afie-telemetry
  template:
    metadata:
      labels:
        app: afie-telemetry
    spec:
      containers:
        - name: telemetry
          image: afie-telemetry:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: Telemetry__PrometheusUrl
              value: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
            - name: Telemetry__OutputPath
              value: "/app/data"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: telemetry-data
              mountPath: /app/data
      volumes:
        - name: telemetry-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: afie-telemetry
  namespace: afie-system
spec:
  selector:
    app: afie-telemetry
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
