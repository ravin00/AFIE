# ArgoCD Application — wires the GitOps controller to AFIE's manifests.
# This is what makes "GitOps controller reconciling infra/gitops/manifests"
# reproducible: apply this and ArgoCD continuously syncs the manifests path.
#
# The manifests under infra/gitops/manifests are plain, controller-agnostic
# Kubernetes YAML, so a Flux Kustomization can target the same path later
# (per the pluggable Argo/Flux backend design). Run only one controller
# against the path at a time.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: afie
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Update repoURL/targetRevision if you fork or rename the repo.
    repoURL: https://github.com/ravin00/AFIE.git
    targetRevision: main
    path: infra/gitops/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
